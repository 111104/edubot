<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduBot — Astana IT University</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --accent3: #8b5cf6;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #475569;
    --success: #10b981;
    --mono: 'Space Mono', monospace;
    --sans: 'Manrope', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-logo {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }

  .header-title {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
  }

  .header-sub {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }

  .header-badge {
    font-size: 11px;
    background: rgba(16,185,129,0.15);
    color: var(--success);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: var(--mono);
  }

  .module-selector {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .module-label {
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
  }

  .module-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  /* MESSAGES */
  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .message {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
    align-self: flex-end;
    max-width: 75%;
  }

  .message.bot {
    max-width: 85%;
  }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent3));
  }

  .avatar.user {
    background: var(--bg3);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
    font-family: var(--mono);
    font-weight: 700;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
  }

  .message.bot .bubble {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(139,92,246,0.2));
    border: 1px solid rgba(59,130,246,0.3);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble code {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
  }

  .bubble pre {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* WELCOME */
  .welcome-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    max-width: 620px;
    margin: auto;
    text-align: center;
  }

  .welcome-emoji { font-size: 48px; margin-bottom: 1rem; display: block; }

  .welcome-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome-text {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .modules-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }

  .module-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s;
    line-height: 1.5;
  }

  .module-btn:hover {
    border-color: var(--accent);
    background: rgba(59,130,246,0.08);
  }

  .module-btn .mod-code {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
    font-weight: 700;
  }

  .mode-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .mode-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.2s;
  }

  .mode-btn:hover {
    border-color: var(--accent3);
    color: var(--text);
  }

  /* INPUT */
  .input-area {
    padding: 1rem 1.5rem 1.5rem;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    padding: 4px 0;
  }

  #user-input::placeholder { color: var(--text3); }

  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* TYPING */
  .typing-dots {
    display: flex;
    gap: 5px;
    padding: 6px 2px;
    align-items: center;
  }

  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-7px); opacity: 1; }
  }

  .error-msg {
    color: #ef4444;
    font-size: 13px;
    padding: 8px 12px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    margin-top: 8px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">🤖</div>
    <div>
      <div class="header-title">EduBot</div>
      <div class="header-sub">Astana IT University</div>
    </div>
    <div class="header-badge">● Online</div>
  </div>
  <div class="module-selector">
    <span class="module-label">Модуль:</span>
    <select class="module-select" id="module-select" onchange="currentModule=this.value">
      <option value="auto">Авто</option>
      <option value="km03">КМ03 — Бағдарламалау</option>
      <option value="km04">КМ04 — Web-сайт</option>
      <option value="km05">КМ05 — Рефакторинг</option>
      <option value="km06">КМ06 — Микроконтроллер</option>
      <option value="km07">КМ07 — Мобильді қосымша</option>
    </select>
  </div>
</div>

<div class="messages-wrap" id="messages">
  <div class="welcome-card">
    <span class="welcome-emoji">👋</span>
    <div class="welcome-title">Сәлем! Мен EduBot</div>
    <div class="welcome-text">
      Astana IT University колледжінің AI оқу ассистентімін.<br>
      Қай модуль бойынша жұмыс жасаймыз?
    </div>
    <div class="modules-grid">
      <button class="module-btn" onclick="selectModule('km03')">
        <span class="mod-code">КМ03 / ПМ03</span>
        Бағдарламалық қамтамасыз ету модульдерін бағдарламалау
      </button>
      <button class="module-btn" onclick="selectModule('km04')">
        <span class="mod-code">КМ04 / ПМ04</span>
        Web-сайтты жобалау және үздіксіз жұмыс
      </button>
      <button class="module-btn" onclick="selectModule('km05')">
        <span class="mod-code">КМ05 / ПМ05</span>
        Бағдарламалық кодтың рефакторингін тексеру
      </button>
      <button class="module-btn" onclick="selectModule('km06')">
        <span class="mod-code">КМ06</span>
        Микроконтроллер негізінде сандық құрылғыларды бағдарламалау
      </button>
    </div>
    <button class="module-btn" style="width:100%" onclick="selectModule('km07')">
      <span class="mod-code">КМ07</span>
      Мобильді қосымшаларды әзірлеу
    </button>
    <div class="mode-row">
      <button class="mode-btn" onclick="quickSend('Тақырыпты түсіндір')">📖 Тақырып түсіндір</button>
      <button class="mode-btn" onclick="quickSend('Практикалық тапсырма бер')">🧪 Тапсырма бер</button>
      <button class="mode-btn" onclick="quickSend('Емтиханға дайындай')">🎯 Емтиханға дайындай</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Сұрағыңды жаз..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let chatHistory = [];
let currentModule = 'auto';

const MODULE_NAMES = {
  km03: 'КМ03 — Бағдарламалау',
  km04: 'КМ04 — Web-сайт',
  km05: 'КМ05 — Рефакторинг',
  km06: 'КМ06 — Микроконтроллер',
  km07: 'КМ07 — Мобильді қосымша',
};

function selectModule(mod) {
  currentModule = mod;
  document.getElementById('module-select').value = mod;
  const name = MODULE_NAMES[mod];
  addMessage('user', name + ' модулі бойынша жұмыс жасайық');
  getBotResponse(name + ' модулі бойынша жұмыс жасайық');
}

function quickSend(text) {
  addMessage('user', text);
  getBotResponse(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function sendMessage() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  addMessage('user', text);
  getBotResponse(text);
}

function addMessage(role, text) {
  const wrap = document.getElementById('messages');
  const wc = wrap.querySelector('.welcome-card');
  if (wc) wc.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? '🤖' : 'СТ';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;

  chatHistory.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
}

function formatText(text) {
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(avatar);
  div.appendChild(bubble);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function getBotResponse(userText) {
  const sendBtn = document.getElementById('send-btn');
  const userInp = document.getElementById('user-input');
  sendBtn.disabled = true;
  userInp.disabled = true;
  showTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: chatHistory,
        module: currentModule
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) {
      showError('Қате: ' + data.error);
    } else {
      addMessage('bot', data.response);
    }
  } catch (err) {
    hideTyping();
    showError('Сервермен байланыс жоқ. Бетті жаңарт.');
  }

  sendBtn.disabled = false;
  userInp.disabled = false;
  userInp.focus();
}

function showError(msg) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = msg;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}
</script>
</body>
</html>
